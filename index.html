<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UE5 Class Hierarchy Reference</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg: #0c0c0e;
  --bg2: #141418;
  --bg3: #1c1c22;
  --bg4: #24242c;
  --text: #e2e0d8;
  --text2: #9c9a92;
  --text3: #6c6a64;
  --border: #2a2a32;
  --accent: #7c6ff7;
  --accent2: #9d93f8;
  --actor: #3b8bdd;
  --actor-bg: #0e1e30;
  --actor-border: #1a3a5c;
  --comp: #1d9e75;
  --comp-bg: #0a2a1e;
  --comp-border: #14503a;
  --ctrl: #d4537e;
  --ctrl-bg: #2e1220;
  --ctrl-border: #5c2240;
  --info: #d85a30;
  --info-bg: #2a1408;
  --info-border: #5c2810;
  --ui: #ef9f27;
  --ui-bg: #2a1e08;
  --ui-border: #5c4010;
  --data: #639922;
  --data-bg: #162008;
  --data-border: #304810;
  --sub: #888780;
  --sub-bg: #1a1a1e;
  --sub-border: #3a3a40;
  --ai: #e24b4a;
  --ai-bg: #2a1010;
  --ai-border: #5c2020;
  --root: #7c6ff7;
  --root-bg: #181630;
  --root-border: #302a5c;
  --phys: #5dcaa5;
  --phys-bg: #0a2820;
  --phys-border: #185040;
  --anim: #ed93b1;
  --anim-bg: #2a1420;
  --anim-border: #5c2840;
  --net: #85b7eb;
  --net-bg: #0e1e30;
  --net-border: #1a3a5c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); color: var(--text); }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 32px 32px 0;
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
}

header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.5px;
}
header h1 span { color: var(--accent); }

header p {
  color: var(--text2);
  font-size: 13px;
  margin-top: 6px;
}

.toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 32px;
}
.toolbar-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.search-box {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 8px 12px 8px 36px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box::before {
  content: '';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  border: 2px solid var(--text3);
  border-radius: 50%;
}
.search-box::after {
  content: '';
  position: absolute;
  left: 24px;
  top: 60%;
  width: 2px;
  height: 6px;
  background: var(--text3);
  transform: rotate(-45deg);
  transform-origin: top;
}

.filter-pills {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.pill {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .15s;
  user-select: none;
  font-family: 'IBM Plex Sans', sans-serif;
}
.pill.active { opacity: 1; }
.pill:not(.active) { opacity: 0.35; }
.pill:hover { opacity: 0.8; }

.btn-group {
  display: flex;
  gap: 4px;
}
.btn {
  padding: 6px 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-size: 11px;
  font-family: 'IBM Plex Sans', sans-serif;
  cursor: pointer;
  transition: all .15s;
}
.btn:hover { background: var(--bg4); color: var(--text); border-color: var(--text3); }

.counter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
}

main {
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
  padding: 16px 32px 64px;
  flex: 1;
}

.tree { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
.tree ul { list-style: none; padding-left: 24px; }
.tree > ul { padding-left: 0; }

.tree li { position: relative; }
.tree li::before {
  content: '';
  position: absolute;
  left: -16px;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--border);
}
.tree li::after {
  content: '';
  position: absolute;
  left: -16px;
  top: 18px;
  width: 14px;
  height: 1px;
  background: var(--border);
}
.tree > ul > li::before,
.tree > ul > li::after { display: none; }
.tree li:last-child::before { bottom: calc(100% - 18px); }

.node-row {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  margin: 1px 0;
  border-radius: 6px;
  transition: background .12s;
  cursor: default;
  max-width: 100%;
}
.node-row:hover { background: var(--bg3); }
.node-row.expandable { cursor: pointer; }

.caret {
  width: 0; height: 0;
  border-left: 5px solid var(--text3);
  border-top: 4px solid transparent;
  border-bottom: 4px solid transparent;
  transition: transform .15s;
  flex-shrink: 0;
}
.caret.open { transform: rotate(90deg); }
.caret.hidden { visibility: hidden; }

.cls-name {
  font-weight: 600;
  font-size: 13px;
  white-space: nowrap;
}

.tag {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  padding: 1px 7px;
  border-radius: 4px;
  white-space: nowrap;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  flex-shrink: 0;
}

.desc {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 12px;
  color: var(--text3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cat-actor .cls-name { color: var(--actor); }
.cat-actor .tag { background: var(--actor-bg); color: var(--actor); border: 1px solid var(--actor-border); }
.cat-comp .cls-name { color: var(--comp); }
.cat-comp .tag { background: var(--comp-bg); color: var(--comp); border: 1px solid var(--comp-border); }
.cat-ctrl .cls-name { color: var(--ctrl); }
.cat-ctrl .tag { background: var(--ctrl-bg); color: var(--ctrl); border: 1px solid var(--ctrl-border); }
.cat-info .cls-name { color: var(--info); }
.cat-info .tag { background: var(--info-bg); color: var(--info); border: 1px solid var(--info-border); }
.cat-ui .cls-name { color: var(--ui); }
.cat-ui .tag { background: var(--ui-bg); color: var(--ui); border: 1px solid var(--ui-border); }
.cat-data .cls-name { color: var(--data); }
.cat-data .tag { background: var(--data-bg); color: var(--data); border: 1px solid var(--data-border); }
.cat-sub .cls-name { color: var(--sub); }
.cat-sub .tag { background: var(--sub-bg); color: var(--sub); border: 1px solid var(--sub-border); }
.cat-ai .cls-name { color: var(--ai); }
.cat-ai .tag { background: var(--ai-bg); color: var(--ai); border: 1px solid var(--ai-border); }
.cat-root .cls-name { color: var(--root); }
.cat-root .tag { background: var(--root-bg); color: var(--root); border: 1px solid var(--root-border); }
.cat-phys .cls-name { color: var(--phys); }
.cat-phys .tag { background: var(--phys-bg); color: var(--phys); border: 1px solid var(--phys-border); }
.cat-anim .cls-name { color: var(--anim); }
.cat-anim .tag { background: var(--anim-bg); color: var(--anim); border: 1px solid var(--anim-border); }
.cat-net .cls-name { color: var(--net); }
.cat-net .tag { background: var(--net-bg); color: var(--net); border: 1px solid var(--net-border); }

.highlight { background: #7c6ff720; border-radius: 4px; }

.plugin-badge {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--bg4);
  color: var(--text3);
  border: 1px solid var(--border);
  white-space: nowrap;
}

.tree li.hidden-by-filter { display: none; }
.tree li.hidden-by-search { display: none; }

footer {
  padding: 24px 32px;
  text-align: center;
  font-size: 11px;
  color: var(--text3);
  border-top: 1px solid var(--border);
}
footer a { color: var(--accent2); text-decoration: none; }
footer a:hover { text-decoration: underline; }

@media (max-width: 700px) {
  header, main, .toolbar { padding-left: 16px; padding-right: 16px; }
  .desc { display: none; }
}
</style>
</head>
<body>

<header>
  <h1><span>UE5</span> Class Hierarchy Reference</h1>
  <p>Every inheritable base class in Unreal Engine 5 &mdash; core engine + major plugins. Click to expand. Search to find.</p>
</header>

<div class="toolbar">
<div class="toolbar-inner">
  <div class="search-box">
    <input type="text" id="search" placeholder="Search classes..." autocomplete="off">
  </div>
  <div class="filter-pills" id="filters"></div>
  <div class="btn-group">
    <button class="btn" onclick="toggleAll(true)">Expand all</button>
    <button class="btn" onclick="toggleAll(false)">Collapse all</button>
  </div>
  <div class="counter" id="counter"></div>
</div>
</div>

<main>
<div class="tree" id="tree"></div>
</main>

<footer>
  Full API reference: <a href="https://dev.epicgames.com/documentation/en-us/unreal-engine/API/ClassHierarchy" target="_blank">dev.epicgames.com/documentation/.../API/ClassHierarchy</a>
  &nbsp;|&nbsp; In-editor: Window &rarr; Developer Tools &rarr; Class Viewer
</footer>

let totalCount = 0;
let activeFilters = new Set(Object.keys(CATS));

function countNodes(node) {
  let c = 1;
  for (const ch of node.ch) c += countNodes(ch);
  return c;
}
totalCount = countNodes(tree);

function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = Object.entries(CATS).map(([k,v]) =>
    `<span class="pill cat-${v.color} active" data-cat="${k}" onclick="toggleFilter('${k}',this)">${v.label}</span>`
  ).join('');
}

function toggleFilter(cat, pill) {
  if (activeFilters.has(cat)) { activeFilters.delete(cat); pill.classList.remove('active'); }
  else { activeFilters.add(cat); pill.classList.add('active'); }
  applyFilters();
}

function renderTree(node, depth) {
  const hasChildren = node.ch.length > 0;
  const open = depth < 1;
  let html = `<li data-cat="${node.cat}" data-name="${node.n.toLowerCase()}">`;
  html += `<div class="node-row cat-${CATS[node.cat].color} ${hasChildren?'expandable':''}" ${hasChildren?'onclick="togNode(this)"':''}>`;
  html += `<span class="caret ${hasChildren?(open?'open':''):'hidden'}"></span>`;
  html += `<span class="cls-name">${node.n}</span>`;
  html += `<span class="tag">${CATS[node.cat].label}</span>`;
  if (node.plug) html += `<span class="plugin-badge">${node.plug}</span>`;
  html += `<span class="desc">${node.d}</span>`;
  html += '</div>';
  if (hasChildren) {
    html += `<ul style="${open?'':'display:none'}">`;
    for (const ch of node.ch) html += renderTree(ch, depth+1);
    html += '</ul>';
  }
  html += '</li>';
  return html;
}

function togNode(row) {
  const li = row.parentElement;
  const ul = li.querySelector(':scope > ul');
  const caret = row.querySelector('.caret');
  if (!ul) return;
  const open = ul.style.display !== 'none';
  ul.style.display = open ? 'none' : '';
  caret.classList.toggle('open', !open);
}

function toggleAll(open) {
  document.querySelectorAll('.tree .expandable').forEach(row => {
    const ul = row.parentElement.querySelector(':scope > ul');
    const caret = row.querySelector('.caret');
    if (ul) { ul.style.display = open ? '' : 'none'; caret.classList.toggle('open', open); }
  });
}

function applyFilters() {
  document.querySelectorAll('.tree li[data-cat]').forEach(li => {
    li.classList.toggle('hidden-by-filter', !activeFilters.has(li.dataset.cat));
  });
  updateCounter();
}

function applySearch(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.tree li[data-name]').forEach(li => {
    if (!q) { li.classList.remove('hidden-by-search'); li.querySelector('.cls-name')?.classList.remove('highlight'); return; }
    const match = li.dataset.name.includes(q);
    li.classList.toggle('hidden-by-search', !match);
    li.querySelector('.cls-name')?.classList.toggle('highlight', match);
    if (match) {
      let parent = li.parentElement?.closest('li');
      while (parent) {
        parent.classList.remove('hidden-by-search');
        const ul = parent.querySelector(':scope > ul');
        const caret = parent.querySelector('.caret');
        if (ul) { ul.style.display = ''; caret?.classList.add('open'); }
        parent = parent.parentElement?.closest('li');
      }
    }
  });
  updateCounter();
}

function updateCounter() {
  const visible = document.querySelectorAll('.tree li[data-cat]:not(.hidden-by-filter):not(.hidden-by-search)').length;
  document.getElementById('counter').textContent = `${visible} / ${totalCount} classes`;
}

renderFilters();
document.getElementById('tree').innerHTML = '<ul>' + renderTree(tree, 0) + '</ul>';
updateCounter();

let searchTimeout;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => applySearch(e.target.value), 150);
});
</script>
